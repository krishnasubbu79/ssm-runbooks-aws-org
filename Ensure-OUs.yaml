description: Ensures the configured STDB organizational units exist under the organization root.
schemaVersion: '0.3'
assumeRole: '{{ AutomationAssumeRole }}'
outputs:
  - ensureOUs.RootId
  - ensureOUs.OuMap
  - ensureOUs.CreatedOus
  - ensureOUs.StepMetadata
parameters:
  AutomationAssumeRole:
    type: String
    description: IAM role ARN that SSM Automation should assume.
  ConfigParameterName:
    type: String
    description: SSM Parameter Store name containing the STDB org bootstrap config.
  RunId:
    type: String
    description: Correlation ID for tracing this execution in CloudWatch Logs.
    default: ''
mainSteps:
  - name: ensureOUs
    action: aws:executeScript
    isEnd: true
    inputs:
      Runtime: python3.11
      Handler: script_handler
      InputPayload:
        ConfigParameterName: '{{ ConfigParameterName }}'
        RunId: '{{ RunId }}'
      Script: |-
        import json
        import boto3
        import uuid
        from datetime import datetime, timezone

        def log(run_id, event, **kwargs):
            entry = {"runId": run_id, "step": "Ensure-OUs", "event": event}
            entry.update(kwargs)
            print(json.dumps(entry))

        def load_config(parameter_name):
            ssm = boto3.client("ssm")
            response = ssm.get_parameter(Name=parameter_name, WithDecryption=True)
            return json.loads(response["Parameter"]["Value"])

        def get_root_id(orgs):
            roots = orgs.list_roots()["Roots"]
            if len(roots) != 1:
                raise ValueError(f"Expected exactly one root, found {len(roots)}")
            return roots[0]["Id"]

        def list_ous_for_parent(orgs, parent_id):
            ous = []
            paginator = orgs.get_paginator("list_organizational_units_for_parent")
            for page in paginator.paginate(ParentId=parent_id):
                ous.extend(page.get("OrganizationalUnits", []))
            return ous

        def script_handler(events, context):
            run_id = events.get("RunId", "").strip()
            if not run_id:
                ts = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%S")
                run_id = f"ensure-ous-{ts}-{uuid.uuid4().hex[:6]}"
            log(run_id, "step_started")

            config = load_config(events["ConfigParameterName"])
            log(run_id, "config_loaded", ouCount=len(config.get("organizationalUnits", [])))

            orgs = boto3.client("organizations")
            root_id = get_root_id(orgs)
            log(run_id, "root_discovered", rootId=root_id)
            existing = {
                ou["Name"]: ou["Id"]
                for ou in list_ous_for_parent(orgs, root_id)
            }

            created = []
            ou_map = {}

            for ou in config.get("organizationalUnits", []):
                if ou.get("parentKey") != "root":
                    raise ValueError(f"Unsupported parentKey for v1: {ou.get('parentKey')}")

                name = ou["name"]
                if name in existing:
                    ou_id = existing[name]
                    log(run_id, "ou_exists", name=name, ouId=ou_id)
                else:
                    response = orgs.create_organizational_unit(
                        ParentId=root_id,
                        Name=name,
                    )
                    ou_id = response["OrganizationalUnit"]["Id"]
                    existing[name] = ou_id
                    created.append({"key": ou["key"], "name": name, "id": ou_id})
                    log(run_id, "ou_created", key=ou["key"], name=name, ouId=ou_id)

                ou_map[ou["key"]] = {
                    "name": name,
                    "id": ou_id,
                    "parentId": root_id,
                }

            log(run_id, "step_completed", createdCount=len(created), existingCount=len(ou_map) - len(created))

            return {
                "RootId": root_id,
                "OuMap": json.dumps(ou_map),
                "CreatedOus": json.dumps(created),
                "StepMetadata": json.dumps({
                    "runId": run_id,
                    "step": "Ensure-OUs",
                    "timestamp": datetime.now(timezone.utc).isoformat(),
                    "status": "succeeded",
                    "createdCount": len(created),
                    "existingCount": len(ou_map) - len(created),
                }),
            }
    outputs:
      - Name: RootId
        Selector: $.Payload.RootId
        Type: String
      - Name: OuMap
        Selector: $.Payload.OuMap
        Type: String
      - Name: CreatedOus
        Selector: $.Payload.CreatedOus
        Type: String
      - Name: StepMetadata
        Selector: $.Payload.StepMetadata
        Type: String
